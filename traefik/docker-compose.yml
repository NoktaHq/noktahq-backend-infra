# API Gateway (Traefik) for api.noktahq.in
# Run once on the VPC. Backends (skillfort, stitchfolio) join network noktahq_web and are discovered via labels.
# traefik:v3.6+ required for Docker 29+ (daemon requires API 1.44+); v3.2 fails with "client version 1.24 is too old".
# Portainer: optional UI at http://<VPS-IP>:9000 (create admin on first visit).

services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - DOCKER_API_VERSION=1.44
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic:/etc/traefik/dynamic:ro
      - traefik_logs:/var/log/traefik
      # ACME storage for Let's Encrypt (when using certificatesResolvers)
      - traefik_acme:/letsencrypt
      # Existing SSL certs: mount full letsencrypt dir so live/ symlinks resolve
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - noktahq_web
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - noktahq_web

networks:
  noktahq_web:
    name: noktahq_web
    driver: bridge

volumes:
  traefik_logs: {}
  traefik_acme: {}
  portainer_data: {}
