# API Gateway (Traefik) for api.noktahq.in
# Run once on the VPC. Backends (skillfort, stitchfolio, etc.) join network noktahq_web
# and are discovered automatically by Traefik via Docker labels.
#
# Requirements:
#   - traefik:v3.6+ required for Docker 29+ (daemon API 1.44+).
#   - SSL cert must exist at /etc/letsencrypt/live/api.noktahq.in/ on the host.
#   - noktahq_web network is created by this compose; backends must declare it external.
#
# Portainer: Docker management UI at http://<VPS-IP>:9000

services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Docker socket (read-only): lets Traefik discover containers via labels.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Static configuration.
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      # Dynamic configuration directory (hot-reloaded).
      - ./dynamic:/etc/traefik/dynamic:ro
      # Access logs volume.
      - traefik_logs:/var/log/traefik
      # Full letsencrypt directory so live/ symlinks resolve inside the container.
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - noktahq_web
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - noktahq_web

networks:
  noktahq_web:
    name: noktahq_web
    driver: bridge

volumes:
  traefik_logs: {}
  portainer_data: {}
