# Traefik static configuration for api.noktahq.in
# Docs: https://doc.traefik.io/traefik/v3.3/

api:
  dashboard: true
  # Dashboard served at /traefik/dashboard/ to avoid conflicting with /api/... app paths.
  # See dynamic/dashboard.yml for the router rule.
  basePath: /traefik

entryPoints:
  web:
    address: ":80"
    # Handles all traffic on :80 including Let's Encrypt HTTP challenge.
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    # Only route containers that have traefik.enable=true label.
    exposedByDefault: false
    # Traefik will use the noktahq_web network to reach backends.
    network: noktahq_web
  file:
    # Dynamic config directory (hot-reloaded; no restart needed).
    directory: /etc/traefik/dynamic
    watch: true

log:
  level: INFO

accessLog:
  filePath: "/var/log/traefik/access.log"
  format: json
