# TLS configuration: use existing certificate for api.noktahq.in
# Host mounts /etc/letsencrypt so live/ symlinks resolve inside the container.

tls:
  certificates:
    - certFile: /etc/letsencrypt/live/api.noktahq.in/fullchain.pem
      keyFile: /etc/letsencrypt/live/api.noktahq.in/privkey.pem
  options:
    default:
      minVersion: VersionTLS12
      sniStrict: true
