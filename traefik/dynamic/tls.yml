# TLS configuration (dynamic).
# Docs: https://doc.traefik.io/traefik/v3.3/https/tls/
#
# Uses the existing Let's Encrypt certificate for api.noktahq.in.
# The full /etc/letsencrypt directory is mounted in docker-compose.yml so
# the live/ symlinks resolve correctly inside the container.

tls:
  certificates:
    - certFile: /etc/letsencrypt/live/api.noktahq.in/fullchain.pem
      keyFile: /etc/letsencrypt/live/api.noktahq.in/privkey.pem
  options:
    default:
      minVersion: VersionTLS12
      sniStrict: true
