# Expose Traefik dashboard and API at https://api.noktahq.in/dashboard/
# Single router matching both /dashboard and /api (excluding app paths) as per Traefik docs.
http:
  routers:
    dashboard:
      rule: "Host(`api.noktahq.in`) && (PathPrefix(`/dashboard`) || (PathPrefix(`/api`) && !PathPrefix(`/api/skillfort`) && !PathPrefix(`/api/sf`)))"
      entryPoints:
        - websecure
      service: api@internal
      middlewares:
        - dashboard-auth
  middlewares:
    dashboard-auth:
      basicAuth:
        users:
          - "admin:$apr1$H6uskkkW$IgXLP6ewTrSuBkTrqE8wj/"   # default: admin / changeme ‚Äî change in production
