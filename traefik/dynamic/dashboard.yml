# Expose Traefik dashboard and API at https://api.noktahq.in/dashboard/
# Dashboard requires trailing slash; redirect /dashboard -> /dashboard/
http:
  routers:
    dashboard-redirect:
      rule: "Host(`api.noktahq.in`) && Path(`/dashboard`)"
      entryPoints:
        - websecure
      service: api@internal
      middlewares:
        - dashboard-add-slash
      priority: 100
    dashboard:
      rule: "Host(`api.noktahq.in`) && PathPrefix(`/dashboard`)"
      entryPoints:
        - websecure
      service: api@internal
      middlewares:
        - dashboard-auth
    traefik-api:
      rule: "Host(`api.noktahq.in`) && PathPrefix(`/api`) && !PathPrefix(`/api/skillfort`) && !PathPrefix(`/api/sf`)"
      entryPoints:
        - websecure
      service: api@internal
      middlewares:
        - dashboard-auth
  middlewares:
    dashboard-add-slash:
      redirectRegex:
        regex: "^https://api\\.noktahq\\.in/dashboard$"
        replacement: "https://api.noktahq.in/dashboard/"
    # Restrict access: generate hash with: echo $(htpasswd -nb admin YOUR_PASSWORD) | sed -e s/\\$/\\$\\$/g
    # Then replace the user line below. Remove middlewares from router to allow unauthenticated access.
    dashboard-auth:
      basicAuth:
        users:
          - "admin:$apr1$H6uskkkW$IgXLP6ewTrSuBkTrqE8wj/"   # default: admin / changeme — change in production
