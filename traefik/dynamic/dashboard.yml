# Traefik dashboard and API (dynamic configuration).
# Docs: https://doc.traefik.io/traefik/v3.3/operations/dashboard/
#
# Dashboard URL: https://api.noktahq.in/traefik/dashboard/  (trailing slash mandatory)
# The basePath /traefik is set in traefik.yml so /traefik/dashboard/ and /traefik/api/
# are routed to api@internal without conflicting with app paths (/api/skillfort/, /api/sf/).
#
# Auth: admin / (see password manager).
# To generate a new password hash:
#   echo $(htpasswd -nb admin YOUR_PASSWORD) | sed -e 's/\$/\$\$/g'
# Replace the users entry below with the output.

http:
  routers:
    dashboard:
      rule: "Host(`api.noktahq.in`) && PathPrefix(`/traefik`)"
      entryPoints:
        - websecure
      service: api@internal
      middlewares:
        - dashboard-auth
      tls: {}

  middlewares:
    dashboard-auth:
      basicAuth:
        users:
          - "admin:$apr1$XSdGhBHQ$pa22AQ7tBNvQv9GMG6gFA/"
